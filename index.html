<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Officina Del Caffè</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {font-family: 'Inter', sans-serif; background:#fafafa;}

/* smooth reveal */
.reveal {
opacity:0;
transform:translateY(40px);
transition:all 0.8s ease;
}
.reveal.active {
opacity:1;
transform:translateY(0);
}

/* image zoom */
.img-hover {
transition: transform 0.6s ease;
}
.img-hover:hover {
transform: scale(1.05);
}

/* button hover */
.btn {
transition: all 0.3s ease;
}
.btn:hover {
transform: scale(1.05);
box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>

</head>

<body>
<div id="root"></div>

<script type="text/babel">

const useReveal = () => {
React.useEffect(() => {
const obs = new IntersectionObserver(entries => {
entries.forEach(e=>{
if(e.isIntersecting) e.target.classList.add("active");
});
},{threshold:0.2});

document.querySelectorAll(".reveal").forEach(el=>obs.observe(el));
},[]);
};

const Hero = () => (
<section className="h-screen flex items-center justify-center text-center relative overflow-hidden">

<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93"
className="absolute w-full h-full object-cover scale-110"/>

<div className="absolute inset-0 bg-black/50"></div>

<div className="relative text-white animate-fadeIn">
<h1 className="text-6xl font-serif mb-4">Officina Del Caffè</h1>
<p className="text-xl mb-6">Caffè • Aperitivo • Atmosfera autentica</p>

<a href="https://wa.me/393284854160"
className="btn bg-white text-black px-6 py-3 rounded-full">
WhatsApp
</a>
</div>
</section>
);

const Gallery = () => {
useReveal();

return (
<section className="py-20 text-center">
<h2 className="text-4xl font-serif mb-10 reveal">Il Nostro Ambiente</h2>

<div className="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto">
{[
"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",
"https://images.unsplash.com/photo-1511920170033-f8396924c348",
"https://images.unsplash.com/photo-1554118811-1e0d58224f24"
].map((img,i)=>(
<img key={i} src={img}
className="rounded-xl img-hover reveal"/>
))}
</div>
</section>
);
};

const Menu = () => {
useReveal();

return (
<section className="py-20 bg-gray-50 text-center">
<h2 className="text-4xl font-serif mb-10 reveal">Menu</h2>

<div className="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
{[
["Espresso","€1.50"],
["Cappuccino","€2.00"],
["Cornetto","€1.20"],
["Aperitivo","€5.00"]
].map((item,i)=>(
<div key={i} className="p-6 bg-white rounded-xl shadow-md reveal btn">
<h3 className="font-semibold">{item[0]}</h3>
<p>{item[1]}</p>
</div>
))}
</div>
</section>
);
};

const Reviews = () => {
useReveal();

return (
<section id="reviews" className="py-20 text-center">
<h2 className="text-4xl font-serif mb-6 reveal">Recensioni</h2>

<p className="max-w-xl mx-auto reveal">
⭐ 4.5 su Google Maps — Ambiente accogliente e personale gentile.
</p>

<div className="mt-6">
<a href="https://maps.app.goo.gl/ATvfg1ctk12yHoC59"
className="btn bg-black text-white px-6 py-3 rounded-full">
Lascia una recensione
</a>
</div>
</section>
);
};

const Contact = () => {
useReveal();

return (
<section className="py-20 text-center bg-gray-100">
<h2 className="text-4xl font-serif mb-6 reveal">Contatti</h2>

<p className="reveal">Via Casilina Nord, 63</p>
<p className="reveal">Cassino (FR)</p>
<p className="mt-2 reveal">+39 328 485 4160</p>

<div className="mt-6 reveal">
<iframe 
src="https://www.google.com/maps?q=Via+Casilina+Nord+63+Cassino&output=embed"
width="100%" height="300"></iframe>
</div>
</section>
);
};

const App = () => (
<>
<Hero/>
<Gallery/>
<Menu/>
<Reviews/>
<Contact/>
</>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>

</body>
</html>
