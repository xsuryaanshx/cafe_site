<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officina Del Caffè — Cassino</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {font-family: 'Inter', sans-serif; background:#0a0a0a; color:white;}
.font-serif {font-family:'Cormorant Garamond', serif;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const Navigation = () => (
<nav className="fixed w-full top-0 bg-black/70 backdrop-blur-md z-50">
<div className="max-w-7xl mx-auto px-6 flex justify-between h-16 items-center">
<h1 className="font-serif text-2xl">Officina Del Caffè</h1>
</div>
</nav>
);

const Hero = () => (
<section className="h-screen flex items-center justify-center text-center">
<div>
<h1 className="font-serif text-6xl mb-4">Officina Del Caffè</h1>
<p className="text-xl mb-6">Eccellenza del caffè a Cassino ☕</p>
<a href="https://wa.me/393284854160" className="bg-white text-black px-6 py-3 rounded-full">Contattaci</a>
</div>
</section>
);

const Menu = () => (
<section className="py-20 text-center">
<h2 className="text-4xl mb-10 font-serif">Menu</h2>
<div className="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto">
{[
["Espresso","€1.50"],
["Cappuccino","€2.00"],
["Cornetto","€1.20"],
["Aperitivo","€5.00"]
].map((item,i)=>(
<div key={i} className="p-6 bg-white/5 rounded-xl">
<h3>{item[0]}</h3>
<p>{item[1]}</p>
</div>
))}
</div>
</section>
);

const Reviews = () => (
<section className="py-20 text-center">
<h2 className="text-4xl mb-10 font-serif">Reviews</h2>
<p className="max-w-xl mx-auto">⭐ 4.5 su Google Maps — Ambiente accogliente e personale gentile.</p>
</section>
);

const Contact = () => (
<section className="py-20 text-center">
<h2 className="text-4xl mb-6 font-serif">Contatti</h2>
<p>Via Casilina Nord, 63</p>
<p>Cassino (FR), Italia</p>
<p className="mt-2">+39 328 485 4160</p>

<div className="mt-6">
<iframe 
src="https://www.google.com/maps?q=Via+Casilina+Nord+63+Cassino&output=embed"
width="100%" height="300" style={{border:0}}>
</iframe>
</div>
</section>
);

const App = () => (
<>
<Navigation/>
<Hero/>
<Menu/>
<Reviews/>
<Contact/>
</>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
