<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caffè Roma</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel (so you can write JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-black text-white">

  <div id="root"></div>

  <script type="text/babel">

    const data = {
      name: "Caffè Roma",
      tagline: "Luxury Coffee Experience ☕",
      address: "Via Roma, Cassino",
      whatsapp: "393000000000",
      image: "https://images.unsplash.com/photo-1509042239860-f550ce710b93",
      menu: [
        { name: "Espresso", price: "€1.20" },
        { name: "Cappuccino", price: "€1.50" },
        { name: "Croissant", price: "€2.00" },
      ]
    };

    function Hero() {
      return (
        <div
          className="h-screen bg-cover bg-center flex items-center justify-center"
          style={{ backgroundImage: `url(${data.image})` }}
        >
          <div className="bg-black/60 backdrop-blur-lg p-10 rounded-2xl text-center animate-fade">
            <h1 className="text-5xl font-bold mb-4">{data.name}</h1>
            <p className="text-xl opacity-90">{data.tagline}</p>
          </div>
        </div>
      );
    }

    function Menu() {
      return (
        <div className="py-20 px-6 bg-gradient-to-b from-gray-900 to-black text-center">
          <h2 className="text-4xl font-bold mb-10">Menu</h2>

          <div className="grid md:grid-cols-3 gap-8 max-w-5xl mx-auto">
            {data.menu.map((item, i) => (
              <div
                key={i}
                className="bg-white/10 backdrop-blur-md p-6 rounded-2xl shadow-lg hover:scale-105 transition"
              >
                <h3 className="text-xl font-semibold">{item.name}</h3>
                <p className="text-gray-300 mt-2">{item.price}</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Contact() {
      return (
        <div className="py-20 text-center">
          <h2 className="text-3xl font-bold mb-4">Visit Us</h2>
          <p className="opacity-80">{data.address}</p>
        </div>
      );
    }

    function WhatsApp() {
      return (
        <a
          href={`https://wa.me/${data.whatsapp}`}
          target="_blank"
          className="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-full shadow-xl hover:scale-110 transition"
        >
          Order Now
        </a>
      );
    }

    function App() {
      return (
        <>
          <Hero />
          <Menu />
          <Contact />
          <WhatsApp />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>

</body>
</html>
