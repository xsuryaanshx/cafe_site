<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caffè Roma</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: black;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="text-white">

<div id="root"></div>

<script type="text/babel">

const data = {
  name: "Caffè Roma",
  tagline: "Where Coffee Meets Luxury",
  address: "Via Roma, Cassino",
  whatsapp: "393000000000",
  hero: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",
  gallery: [
    "https://images.unsplash.com/photo-1509042239860-f550ce710b93",
    "https://images.unsplash.com/photo-1464306076886-debca5e8a6b0",
    "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb"
  ],
  menu: [
    { name: "Espresso", price: "€1.20" },
    { name: "Cappuccino", price: "€1.50" },
    { name: "Croissant", price: "€2.00" }
  ]
};

function Hero() {
  return (
    <div className="h-screen relative flex items-center justify-center text-center">
      
      <img src={data.hero} className="absolute w-full h-full object-cover opacity-40"/>

      <div className="z-10 max-w-2xl">
        <h1 className="text-6xl md:text-7xl mb-6">{data.name}</h1>
        <p className="text-xl opacity-80">{data.tagline}</p>

        <a
          href={`https://wa.me/${data.whatsapp}`}
          className="mt-8 inline-block bg-white text-black px-6 py-3 rounded-full hover:scale-110 transition"
        >
          Reserve Table
        </a>
      </div>

    </div>
  );
}

function Menu() {
  return (
    <div className="py-24 text-center">
      <h2 className="text-5xl mb-12">Our Menu</h2>

      <div className="space-y-6 max-w-xl mx-auto">
        {data.menu.map((item, i) => (
          <div key={i} className="flex justify-between border-b border-gray-700 pb-2">
            <span>{item.name}</span>
            <span>{item.price}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Gallery() {
  return (
    <div className="py-24 px-6">
      <h2 className="text-5xl text-center mb-12">Experience</h2>

      <div className="grid md:grid-cols-3 gap-6">
        {data.gallery.map((img, i) => (
          <img
            key={i}
            src={img}
            className="rounded-xl hover:scale-105 transition duration-500"
          />
        ))}
      </div>
    </div>
  );
}

function Reviews() {
  return (
    <div className="py-24 text-center bg-white text-black">
      <h2 className="text-5xl mb-12">What People Say</h2>

      <div className="max-w-2xl mx-auto space-y-6">
        <p>"Best coffee in Cassino!" ⭐⭐⭐⭐⭐</p>
        <p>"Amazing vibe and service." ⭐⭐⭐⭐⭐</p>
      </div>
    </div>
  );
}

function Footer() {
  return (
    <div className="py-12 text-center">
      <p>{data.address}</p>
    </div>
  );
}

function App() {
  return (
    <>
      <Hero />
      <Menu />
      <Gallery />
      <Reviews />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
