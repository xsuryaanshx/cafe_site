<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caffè Roma</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- AOS (scroll animations) -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins', sans-serif; }

    .glow {
      box-shadow: 0 0 40px rgba(255,255,255,0.1);
    }

    .parallax {
      background-attachment: fixed;
    }
  </style>
</head>

<body class="bg-black text-white">

<div id="root"></div>

<script type="text/babel">

const { useEffect } = React;

const data = {
  name: "Caffè Roma",
  tagline: "Luxury Coffee Experience ☕",
  address: "Via Roma, Cassino",
  whatsapp: "393000000000",
  image: "https://images.unsplash.com/photo-1509042239860-f550ce710b93",
  menu: [
    { name: "Espresso", price: "€1.20" },
    { name: "Cappuccino", price: "€1.50" },
    { name: "Croissant", price: "€2.00" },
    { name: "Latte", price: "€2.50" },
    { name: "Mocha", price: "€3.00" }
  ]
};

function Hero() {
  return (
    <div
      className="h-screen bg-cover bg-center flex items-center justify-center parallax"
      style={{ backgroundImage: `url(${data.image})` }}
    >
      <div 
        data-aos="zoom-in"
        className="bg-black/60 backdrop-blur-lg p-10 rounded-2xl text-center glow"
      >
        <h1 className="text-5xl md:text-6xl font-bold mb-4">{data.name}</h1>
        <p className="text-xl opacity-90">{data.tagline}</p>
      </div>
    </div>
  );
}

function Menu() {
  return (
    <div className="py-24 px-6 text-center bg-gradient-to-b from-gray-900 to-black">
      <h2 className="text-4xl font-bold mb-12" data-aos="fade-up">Menu</h2>

      <div className="grid md:grid-cols-3 gap-10 max-w-6xl mx-auto">
        {data.menu.map((item, i) => (
          <div
            key={i}
            data-aos="fade-up"
            data-aos-delay={i * 100}
            className="bg-white/10 backdrop-blur-md p-6 rounded-2xl glow hover:scale-110 transition duration-300"
          >
            <h3 className="text-xl font-semibold">{item.name}</h3>
            <p className="text-gray-300 mt-2">{item.price}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

function Contact() {
  return (
    <div className="py-24 text-center">
      <h2 className="text-3xl font-bold mb-4" data-aos="fade-up">Visit Us</h2>
      <p className="opacity-80" data-aos="fade-up" data-aos-delay="200">
        {data.address}
      </p>
    </div>
  );
}

function WhatsApp() {
  return (
    <a
      href={`https://wa.me/${data.whatsapp}`}
      target="_blank"
      className="fixed bottom-6 right-6 bg-green-500 text-white px-6 py-3 rounded-full shadow-xl hover:scale-110 transition glow"
    >
      Order Now
    </a>
  );
}

function App() {

  useEffect(() => {
    AOS.init({
      duration: 1000,
      once: true
    });
  }, []);

  return (
    <>
      <Hero />
      <Menu />
      <Contact />
      <WhatsApp />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
